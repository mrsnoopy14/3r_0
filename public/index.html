    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height. `100dvh` (dynamic
         viewport height) tracks mobile browsers' collapsing URL bar — plain
         100% leaves a dead gap under the app on phones. Older browsers fall
         back to the 100% line. */
      #root {
        display: flex;
        height: 100%;
        height: 100dvh;
        flex: 1;
      }
      /* Kill the browser's default black focus ring on inputs — every field
         already has its own styled container, so the ring double-highlights. */
      input:focus,
      input:focus-visible,
      textarea:focus,
      textarea:focus-visible,
      select:focus,
      select:focus-visible {
        outline: none !important;
        box-shadow: none !important;
      }
    </style>
